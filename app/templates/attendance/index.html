{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <div>
        <h1 class="page-title">Attendance Tracking</h1>
        <p class="page-subtitle">Daily student attendance management</p>
    </div>
    <div class="header-actions">
        <button id="header-save-btn" class="btn btn-success"><i class="fas fa-save"></i> Save Attendance</button>
    </div>
</div>

<div class="dashboard-container">
    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="filter-group">
            <label>Session</label>
            <select id="session-select" class="form-control">
                <option value="">Select Session</option>
                {% for session in sessions %}
                <option value="{{ session.id }}">{{ session.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="filter-group">
            <label>Term</label>
            <select id="term-select" class="form-control">
                <option value="">Select Term</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Class</label>
            <select id="class-select" class="form-control">
                <option value="">Select Class</option>
                {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="filter-actions" style="margin-left: auto; display: flex; gap: 10px;">
            <button id="save-btn" class="btn btn-primary"><i class="fas fa-save"></i> Save Attendance</button>
        </div>
    </div>

    <!-- Attendance Table -->
    <div class="score-grid-container">
        <table class="score-table" id="attendance-table">
            <thead>
                <tr>
                    <th style="width: 15%;">Reg Number</th>
                    <th style="width: 45%;">Student Name</th>
                    <th style="width: 20%;">Times Present</th>
                    <th style="width: 20%;">Times Absent</th>
                </tr>
            </thead>
            <tbody id="attendance-tbody">
                <tr>
                    <td colspan="4" class="no-data">Select a class to manage attendance</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/attendance.js') }}?v=1"></script>
{% endblock %}
